<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Image — pickedby.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #000;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* Grid lines */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Top gold line */
    .line-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700 30%, #FFD700 70%, transparent);
    }

    /* Bottom gold line */
    .line-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700 30%, #FFD700 70%, transparent);
    }

    /* Big crown — centered background watermark */
    .crown-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.055;
      pointer-events: none;
    }

    /* Content stack — centered */
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .logo-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      color: #FFD700;
      letter-spacing: -1px;
      line-height: 1;
    }
    .logo-text .by { color: #fff; }

    .beta-chip {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      background: rgba(255,215,0,0.12);
      color: #FFD700;
      border: 1px solid rgba(255,215,0,0.3);
      padding: 5px 10px;
      letter-spacing: 0.1em;
    }

    /* Hero title */
    .hero-title {
      font-size: 70px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 24px;
      text-shadow: 0 0 80px rgba(255,215,0,0.2), 0 0 160px rgba(255,215,0,0.08);
    }
    .hero-title em {
      font-style: normal;
      color: #FFD700;
    }

    /* Sub */
    .hero-sub {
      font-size: 21px;
      color: #555;
      margin-bottom: 44px;
      letter-spacing: 0.01em;
    }
    .hero-sub strong { color: #888; }

    /* Badges row */
    .badges-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 10px 18px;
      letter-spacing: 0.1em;
    }
    .badge-gold   { background: rgba(255,215,0,0.12);  color: #FFD700; border: 1px solid rgba(255,215,0,0.35); }
    .badge-silver { background: rgba(192,192,192,0.10); color: #C0C0C0; border: 1px solid rgba(192,192,192,0.25); }
    .badge-bronze { background: rgba(205,127,50,0.10);  color: #CD7F32; border: 1px solid rgba(205,127,50,0.25); }

    .score-pill {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: #FFD700;
      border: 1px solid #222;
      padding: 10px 22px;
      letter-spacing: 0.15em;
    }

    .sep { color: #2a2a2a; font-size: 16px; }

    /* Corners */
    .corner {
      position: absolute;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: #1e1e1e;
      letter-spacing: 0.2em;
      z-index: 3;
    }
    .corner-tl { top: 28px; left: 40px; }
    .corner-tr { top: 28px; right: 40px; }
    .corner-bl { bottom: 28px; left: 40px; }
    .corner-br { bottom: 28px; right: 40px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="line-top"></div>
    <div class="line-bottom"></div>

    <!-- Large centered crown watermark -->
    <div class="crown-bg">
      <svg width="520" height="416" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/>
        <rect x="9" y="0" width="2" height="4"/>
        <rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/>
        <rect x="18" y="6" width="2" height="6"/>
        <rect x="4" y="8" width="2" height="2"/>
        <rect x="9" y="8" width="2" height="2"/>
        <rect x="14" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
    </div>

    <!-- Corners -->
    <div class="corner corner-tl">AI VISIBILITY SCORE</div>
    <div class="corner corner-tr">FREE · 10 SEC · NO SIGNUP</div>
    <div class="corner corner-bl">THUNOVA · 2026</div>
    <div class="corner corner-br">pickedby.ai</div>

    <!-- Main content -->
    <div class="content">

      <!-- Logo -->
      <div class="logo-row">
        <svg width="28" height="22" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="2" height="4"/>
          <rect x="9" y="0" width="2" height="4"/>
          <rect x="18" y="0" width="2" height="4"/>
          <rect x="0" y="4" width="20" height="2"/>
          <rect x="0" y="6" width="2" height="6"/>
          <rect x="18" y="6" width="2" height="6"/>
          <rect x="4" y="8" width="2" height="2"/>
          <rect x="9" y="8" width="2" height="2"/>
          <rect x="14" y="8" width="2" height="2"/>
          <rect x="0" y="12" width="20" height="2"/>
          <rect x="2" y="14" width="16" height="2"/>
        </svg>
        <div class="logo-text">picked<span class="by">by</span>.ai</div>
        <div class="beta-chip">BETA</div>
      </div>

      <!-- Title -->
      <div class="hero-title">
        Does AI <em>recommend</em><br>your product?
      </div>

      <!-- Sub -->
      <div class="hero-sub">
        <strong>Check your AI Visibility Score</strong> — free in 10 seconds.
      </div>

      <!-- Badges -->
      <div class="badges-row">
        <div class="score-pill">SCORE: 0 – 100</div>
        <div class="sep">·</div>
        <div class="badge badge-gold">PICKED BY AI</div>
        <div class="badge badge-silver">SEEN BY AI</div>
        <div class="badge badge-bronze">NOTICED BY AI</div>
      </div>

    </div>
  </div>
</body>
</html>
