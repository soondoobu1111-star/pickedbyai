<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Image — pickedby.ai</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #000;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow: hidden;
    }

    /* Grid lines (subtle) */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Top border line */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700, transparent);
    }

    /* Bottom border line */
    .bottom-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700, transparent);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }

    .logo-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 22px;
      color: #FFD700;
      letter-spacing: -1px;
      line-height: 1;
    }

    .logo-text .by { color: #fff; }

    .beta-chip {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      background: rgba(255,215,0,0.12);
      color: #FFD700;
      border: 1px solid rgba(255,215,0,0.3);
      padding: 4px 10px;
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .hero-title {
      font-size: 72px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 28px;
    }

    .hero-title em {
      font-style: normal;
      color: #FFD700;
    }

    .hero-sub {
      font-size: 22px;
      color: #666;
      text-align: center;
      margin-bottom: 48px;
      letter-spacing: 0.02em;
    }

    .hero-sub strong { color: #999; }

    .badges-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 10px 20px;
      letter-spacing: 0.1em;
    }

    .badge-gold {
      background: rgba(255,215,0,0.12);
      color: #FFD700;
      border: 1px solid rgba(255,215,0,0.35);
    }

    .badge-silver {
      background: rgba(192,192,192,0.1);
      color: #C0C0C0;
      border: 1px solid rgba(192,192,192,0.25);
    }

    .badge-bronze {
      background: rgba(205,127,50,0.1);
      color: #CD7F32;
      border: 1px solid rgba(205,127,50,0.25);
    }

    .score-pill {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #FFD700;
      border: 1px solid #222;
      padding: 10px 24px;
      letter-spacing: 0.15em;
    }

    .sep { color: #333; font-size: 18px; }

    /* Glow effect on title */
    .glow {
      text-shadow: 0 0 60px rgba(255,215,0,0.25), 0 0 120px rgba(255,215,0,0.1);
    }

    /* Corner decoration */
    .corner {
      position: absolute;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: #222;
      letter-spacing: 0.2em;
    }
    .corner-tl { top: 28px; left: 40px; }
    .corner-tr { top: 28px; right: 40px; text-align: right; }
    .corner-bl { bottom: 28px; left: 40px; }
    .corner-br { bottom: 28px; right: 40px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="bottom-line"></div>

    <div class="corner corner-tl">AI VISIBILITY SCORE</div>
    <div class="corner corner-tr">FREE · 10 SEC · NO SIGNUP</div>
    <div class="corner corner-bl">THUNOVA · 2026</div>
    <div class="corner corner-br">pickedby.ai</div>

    <!-- Logo row -->
    <div class="logo-row">
      <svg width="32" height="26" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/>
        <rect x="9" y="0" width="2" height="4"/>
        <rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/>
        <rect x="18" y="6" width="2" height="6"/>
        <rect x="4" y="8" width="2" height="2"/>
        <rect x="9" y="8" width="2" height="2"/>
        <rect x="14" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="logo-text">picked<span class="by">by</span>.ai</div>
      <div class="beta-chip">BETA</div>
    </div>

    <!-- Hero -->
    <div class="hero-title glow">
      Does AI <em>recommend</em><br>your product?
    </div>

    <div class="hero-sub">
      <strong>Check your AI Visibility Score</strong> — free in 10 seconds.
    </div>

    <!-- Score badges -->
    <div class="badges-row">
      <div class="score-pill">SCORE: 0 – 100</div>
      <div class="sep">·</div>
      <div class="badge badge-gold">PICKED BY AI</div>
      <div class="badge badge-silver">SEEN BY AI</div>
      <div class="badge badge-bronze">NOTICED BY AI</div>
    </div>
  </div>
</body>
</html>
