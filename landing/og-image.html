<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 450px; overflow: hidden; background: #000; }
.container {
  width: 1200px; height: 450px;
  background: radial-gradient(ellipse at 30% 50%, #1a1200 0%, #000 65%);
  display: flex; align-items: center;
  padding: 0 80px; gap: 60px;
}
.crown { flex-shrink: 0; }
.divider { width: 1px; height: 280px; background: #222; flex-shrink: 0; }
.text { display: flex; flex-direction: column; gap: 16px; }
.wordmark {
  font-family: 'Courier New', monospace;
  font-size: 72px;
  font-weight: bold;
  color: #FFD700;
  letter-spacing: -2px;
  line-height: 1;
}
.wordmark span { color: #fff; }
.tagline {
  font-family: 'Courier New', monospace;
  font-size: 18px;
  color: #666;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.sub {
  font-family: 'Courier New', monospace;
  font-size: 15px;
  color: #444;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="container">
  <div class="crown">
    <svg width="196" height="157" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" width="2" height="4"/>
      <rect x="9" y="0" width="2" height="4"/>
      <rect x="18" y="0" width="2" height="4"/>
      <rect x="0" y="4" width="20" height="2"/>
      <rect x="0" y="6" width="2" height="6"/>
      <rect x="18" y="6" width="2" height="6"/>
      <rect x="4" y="8" width="2" height="2"/>
      <rect x="9" y="8" width="2" height="2"/>
      <rect x="14" y="8" width="2" height="2"/>
      <rect x="0" y="12" width="20" height="2"/>
      <rect x="2" y="14" width="16" height="2"/>
    </svg>
  </div>
  <div class="divider"></div>
  <div class="text">
    <div class="wordmark">picked<span>by</span>.ai</div>
    <div class="tagline">Get Picked by AI</div>
    <div class="sub">AI Visibility Score for Digital Creators</div>
  </div>
</div>
</body>
</html>
