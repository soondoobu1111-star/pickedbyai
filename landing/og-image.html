<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 450px; overflow: hidden; background: #000; }

.container {
  width: 1200px; height: 450px;
  background: radial-gradient(ellipse at 75% 50%, #140f00 0%, #000 60%);
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 80px;
  position: relative;
  overflow: hidden;
}

/* Crown background pattern */
.crown-pattern {
  position: absolute; inset: 0;
  opacity: 0.012;
  pointer-events: none;
}

.text { display: flex; flex-direction: column; gap: 18px; align-items: flex-end; position: relative; z-index: 1; }

.wordmark {
  font-family: 'Press Start 2P', monospace;
  font-size: 48px;
  color: #FFD700;
  letter-spacing: -1px;
  line-height: 1.2;
  text-align: right;
}
.wordmark span { color: #fff; }

.tagline {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: #555;
  letter-spacing: 3px;
  text-align: right;
}

.sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  color: #333;
  letter-spacing: 1px;
  text-align: right;
  line-height: 1.8;
}

/* badges row */
.badges { display: flex; gap: 8px; margin-top: 4px; }
.badge-mini {
  padding: 5px 10px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  letter-spacing: 1px;
  display: flex; align-items: center; gap: 6px;
}
.badge-mini svg { flex-shrink: 0; }
.badge-gold  { border: 1px solid #FFD700; color: #FFD700; background: #0a0800; }
.badge-silver{ border: 1px solid #C0C0C0; color: #C0C0C0; background: #08090a; }
.badge-bronze{ border: 1px solid #CD7F32; color: #CD7F32; background: #090809; }
</style>
</head>
<body>
<div class="container">

  <!-- Crown background pattern via SVG -->
  <svg class="crown-pattern" xmlns="http://www.w3.org/2000/svg" width="1200" height="450">
    <defs>
      <pattern id="crownPat" x="0" y="0" width="120" height="100" patternUnits="userSpaceOnUse">
        <g fill="#FFD700" transform="translate(10,18) scale(5)">
          <rect x="0" y="0" width="2" height="4"/>
          <rect x="9" y="0" width="2" height="4"/>
          <rect x="18" y="0" width="2" height="4"/>
          <rect x="0" y="4" width="20" height="2"/>
          <rect x="0" y="6" width="2" height="6"/>
          <rect x="18" y="6" width="2" height="6"/>
          <rect x="4" y="8" width="2" height="2"/>
          <rect x="9" y="8" width="2" height="2"/>
          <rect x="14" y="8" width="2" height="2"/>
          <rect x="0" y="12" width="20" height="2"/>
          <rect x="2" y="14" width="16" height="2"/>
        </g>
      </pattern>
    </defs>
    <rect width="1200" height="450" fill="url(#crownPat)"/>
  </svg>

  <!-- Right-aligned text -->
  <div class="text">
    <div class="wordmark">picked<span>by</span>.ai</div>
    <div class="tagline">GET PICKED BY AI</div>
    <div class="sub">AI Visibility Score for Digital Creators</div>
    <div class="badges">
      <div class="badge-mini badge-gold">
        <svg width="10" height="8" viewBox="0 0 20 16" fill="#FFD700"><rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/><rect x="0" y="4" width="20" height="2"/><rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/><rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/><rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/></svg>
        PICKED BY AI
      </div>
      <div class="badge-mini badge-silver">
        <svg width="10" height="8" viewBox="0 0 20 16" fill="#C0C0C0"><rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/><rect x="0" y="4" width="20" height="2"/><rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/><rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/><rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/></svg>
        SEEN BY AI
      </div>
      <div class="badge-mini badge-bronze">
        <svg width="10" height="8" viewBox="0 0 20 16" fill="#CD7F32"><rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/><rect x="0" y="4" width="20" height="2"/><rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/><rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/><rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/></svg>
        NOTICED BY AI
      </div>
    </div>
  </div>
</div>
</body>
</html>
