<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; padding: 50px; display: flex; flex-direction: column; gap: 36px; width: 680px; }
.card { background: #0d0d0d; border: 1px solid #2a2a2a; padding: 28px 34px; display: flex; flex-direction: column; gap: 18px; }
.card-label { font-family: 'Press Start 2P', monospace; font-size: 0.5rem; color: #555; letter-spacing: 3px; }
.logo-row { display: flex; align-items: center; gap: 8px; font-family: 'Press Start 2P', monospace; font-size: 0.85rem; color: #FFD700; letter-spacing: -1px; line-height: 1.6; }
.logo-row .dot { color: #FFD700; }
.zoom-row { display: flex; gap: 32px; align-items: flex-end; padding-top: 14px; border-top: 1px solid #1a1a1a; }
.zoom-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.zoom-label { font-size: 0.6rem; color: #444; font-family: monospace; }
</style>
</head>
<body>

<!-- V2-A: CURRENT (3 equal peaks + 2 side gems) -->
<div class="card">
  <div class="card-label">V2-A — CURRENT (3 피크 등높이 + 젬 2)</div>
  <div class="logo-row">
    <svg width="20" height="16" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
      <rect x="0" y="4" width="20" height="2"/>
      <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
      <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
      <rect x="0" y="12" width="20" height="2"/>
      <rect x="2" y="14" width="16" height="2"/>
    </svg>
    picked<span class="dot">by</span>.ai
  </div>
  <div class="zoom-row">
    <div class="zoom-item">
      <svg width="40" height="32" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">2×</div>
    </div>
    <div class="zoom-item">
      <svg width="80" height="64" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">4×</div>
    </div>
    <div class="zoom-item">
      <svg width="140" height="112" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">7×</div>
    </div>
  </div>
</div>

<!-- V2-B: CENTER PEAK TALLER (stepped crown silhouette) -->
<div class="card">
  <div class="card-label">V2-B — 중앙 피크 더 높게 (계단형)</div>
  <div class="logo-row">
    <svg width="20" height="16" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <!-- center peak tallest (6px) -->
      <rect x="9" y="0" width="2" height="4"/>
      <!-- side peaks shorter (2px, start lower) -->
      <rect x="0" y="2" width="2" height="2"/>
      <rect x="18" y="2" width="2" height="2"/>
      <!-- band top -->
      <rect x="0" y="4" width="20" height="2"/>
      <!-- hollow sides -->
      <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
      <!-- gems -->
      <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
      <!-- band bottom -->
      <rect x="0" y="12" width="20" height="2"/>
      <!-- base -->
      <rect x="2" y="14" width="16" height="2"/>
    </svg>
    picked<span class="dot">by</span>.ai
  </div>
  <div class="zoom-row">
    <div class="zoom-item">
      <svg width="40" height="32" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="0" width="2" height="4"/>
        <rect x="0" y="2" width="2" height="2"/><rect x="18" y="2" width="2" height="2"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">2×</div>
    </div>
    <div class="zoom-item">
      <svg width="80" height="64" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="0" width="2" height="4"/>
        <rect x="0" y="2" width="2" height="2"/><rect x="18" y="2" width="2" height="2"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">4×</div>
    </div>
    <div class="zoom-item">
      <svg width="140" height="112" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="0" width="2" height="4"/>
        <rect x="0" y="2" width="2" height="2"/><rect x="18" y="2" width="2" height="2"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="5" y="8" width="2" height="2"/><rect x="13" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">7×</div>
    </div>
  </div>
</div>

<!-- V2-C: 3 GEMS (center gem added) -->
<div class="card">
  <div class="card-label">V2-C — 젬 3개 (중앙 젬 추가)</div>
  <div class="logo-row">
    <svg width="20" height="16" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
      <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
      <rect x="0" y="4" width="20" height="2"/>
      <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
      <!-- 3 gems: left, center, right -->
      <rect x="4" y="8" width="2" height="2"/>
      <rect x="9" y="8" width="2" height="2"/>
      <rect x="14" y="8" width="2" height="2"/>
      <rect x="0" y="12" width="20" height="2"/>

      <svg width="40" height="32" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>

        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">2×</div>
    </div>
    <div class="zoom-item">
      <svg width="80" height="64" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">4×</div>
    </div>
    <div class="zoom-item">
      <svg width="140" height="112" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
        <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <div class="zoom-label">7×</div>
    </div>
  </div>
</div>

</body>
</html>
