<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badge Preview — pickedby.ai</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 16'><rect fill='%23FFD700' x='0' y='0' width='2' height='4'/><rect fill='%23FFD700' x='9' y='0' width='2' height='4'/><rect fill='%23FFD700' x='18' y='0' width='2' height='4'/><rect fill='%23FFD700' x='0' y='4' width='20' height='2'/><rect fill='%23FFD700' x='0' y='6' width='2' height='6'/><rect fill='%23FFD700' x='18' y='6' width='2' height='6'/><rect fill='%23FFD700' x='4' y='8' width='2' height='2'/><rect fill='%23FFD700' x='9' y='8' width='2' height='2'/><rect fill='%23FFD700' x='14' y='8' width='2' height='2'/><rect fill='%23FFD700' x='0' y='12' width='20' height='2'/><rect fill='%23FFD700' x='2' y='14' width='16' height='2'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; color: #fff; font-family: 'Press Start 2P', monospace; padding: 40px 32px; min-height: 100vh; }

/* Logo */
.logo-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #FFD700; letter-spacing: -1px; margin-bottom: 36px; }
.logo-row .dot { color: #fff; }

/* Controls */
.controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 36px; }
.ctrl-row { display: flex; align-items: center; gap: 12px; }
.ctrl-label { font-size: 0.3rem; color: #444; letter-spacing: 3px; width: 60px; }
.tabs { display: flex; gap: 4px; }
.tab { padding: 8px 16px; font-family: 'Press Start 2P', monospace; font-size: 0.38rem; cursor: pointer; border: 2px solid #333; background: transparent; color: #555; letter-spacing: 2px; transition: all 0.1s; }
.tab.active { border-color: #FFD700; color: #FFD700; background: #0a0800; }
.tab:hover:not(.active) { border-color: #555; color: #888; }

/* Hint */
.size-hint { font-size: 0.32rem; color: #333; letter-spacing: 3px; margin-bottom: 32px; }

/* Badge row — 3 tiers side by side */
.badge-row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
.badge-col { display: flex; flex-direction: column; gap: 8px; }
.tier-label { font-size: 0.3rem; color: #444; letter-spacing: 3px; }

/* ── SHARED badge styles ─────────────────────────────── */
.ai-badge { position: relative; display: flex; }
.ai-badge.gold   { background: #0a0800; border: 2px solid #FFD700; animation: goldPulse 2.5s ease infinite; }
.ai-badge.silver { background: #08090a; border: 2px solid #C0C0C0; }
.ai-badge.bronze { background: #090809; border: 2px solid #CD7F32; }

@keyframes goldPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); border-color: #FFD700; }
  50%     { box-shadow: 0 0 18px 5px rgba(255,215,0,0.3), 0 0 40px 8px rgba(255,215,0,0.08); border-color: #FFE55C; }
}

.badge-tier-text { letter-spacing: 0.15em; opacity: 0.65; }
.badge-title-text { letter-spacing: 0.06em; }
.ai-badge.gold   .badge-tier-text,
.ai-badge.gold   .badge-title-text { color: #FFD700; }
.ai-badge.silver .badge-tier-text,
.ai-badge.silver .badge-title-text { color: #C0C0C0; }
.ai-badge.bronze .badge-tier-text,
.ai-badge.bronze .badge-title-text { color: #CD7F32; }

/* ── SQUARE layout ───────────────────────────────────── */
.badge-sq {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0;
}
.badge-sq .crown { display: flex; justify-content: center; }

/* Square — L */
.sq-l .badge-sq { width: 160px; height: 160px; padding: 0 16px; gap: 10px; }
.sq-l .badge-sq .crown svg { width: 40px; height: 32px; }
.sq-l .badge-sq .badge-tier-text { font-size: 0.28rem; }
.sq-l .badge-sq .badge-title-text { font-size: 0.46rem; }

/* Square — M */
.sq-m .badge-sq { width: 112px; height: 112px; padding: 0 10px; gap: 7px; }
.sq-m .badge-sq .crown svg { width: 28px; height: 22px; }
.sq-m .badge-sq .badge-tier-text { font-size: 0.22rem; }
.sq-m .badge-sq .badge-title-text { font-size: 0.32rem; }

/* Square — S */
.sq-s .badge-sq { width: 80px; height: 80px; padding: 0 8px; gap: 5px; }
.sq-s .badge-sq .crown svg { width: 20px; height: 16px; }
.sq-s .badge-sq .badge-tier-text { display: none; }
.sq-s .badge-sq .badge-title-text { font-size: 0.22rem; }

/* ── RECTANGLE layout ────────────────────────────────── */
.badge-rect {
  flex-direction: row;
  align-items: center;
}
.badge-rect .crown { display: flex; align-items: center; flex-shrink: 0; }
.badge-rect .badge-text-col { display: flex; flex-direction: column; }

/* Rectangle — L */
.rect-l .badge-rect { width: 240px; height: 70px; padding: 0 16px; gap: 14px; }
.rect-l .badge-rect .crown svg { width: 36px; height: 29px; }
.rect-l .badge-rect .badge-title-text { font-size: 0.46rem; margin-bottom: 5px; }
.rect-l .badge-rect .badge-tier-text { font-size: 0.27rem; }

/* Rectangle — M */
.rect-m .badge-rect { width: 180px; height: 54px; padding: 0 12px; gap: 10px; }
.rect-m .badge-rect .crown svg { width: 26px; height: 21px; }
.rect-m .badge-rect .badge-title-text { font-size: 0.34rem; margin-bottom: 4px; }
.rect-m .badge-rect .badge-tier-text { font-size: 0.21rem; }

/* Rectangle — S */
.rect-s .badge-rect { width: 130px; height: 40px; padding: 0 9px; gap: 8px; }
.rect-s .badge-rect .crown svg { width: 18px; height: 14px; }
.rect-s .badge-rect .badge-title-text { font-size: 0.24rem; }
.rect-s .badge-rect .badge-tier-text { display: none; }

/* ── Copy button ─────────────────────────────────────── */
.copy-btn {
  padding: 7px 10px;
  background: transparent;
  border: 1px solid #222;
  color: #3a3a3a;
  font-family: 'Press Start 2P', monospace;
  font-size: 0.26rem;
  cursor: pointer;
  letter-spacing: 1.5px;
  transition: all 0.1s;
  width: 100%;
}
.copy-btn:hover { border-color: #555; color: #666; }
.copy-btn.copied { border-color: #4CAF50; color: #4CAF50; }
</style>
</head>
<body>

<!-- Logo -->
<div class="logo-row">
  <svg width="20" height="16" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
    <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
    <rect x="0" y="4" width="20" height="2"/>
    <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
    <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
    <rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/>
  </svg>
  picked<span class="dot">by</span>.ai — Badge Preview
</div>

<!-- Controls -->
<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">SHAPE</span>
    <div class="tabs" id="shape-tabs">
      <button class="tab active" onclick="setShape('sq', this)">SQUARE</button>
      <button class="tab" onclick="setShape('rect', this)">RECTANGLE</button>
    </div>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">SIZE</span>
    <div class="tabs" id="size-tabs">
      <button class="tab active" onclick="setSize('l', this)">L</button>
      <button class="tab" onclick="setSize('m', this)">M</button>
      <button class="tab" onclick="setSize('s', this)">S</button>
    </div>
  </div>
</div>

<div class="size-hint" id="size-hint">SQUARE · L — 160 × 160px</div>

<!-- Badge Row -->
<div class="badge-row" id="badge-row">

  <!-- GOLD -->
  <div class="badge-col" id="col-gold">
    <div class="tier-label">GOLD 66~82</div>
    <div class="ai-badge gold badge-sq" id="badge-gold">
      <div class="crown">
        <svg viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
          <rect x="0" y="4" width="20" height="2"/>
          <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
          <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
          <rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/>
        </svg>
      </div>
      <div class="badge-text-col">
        <div class="badge-title-text">PICKED BY AI</div>
        <div class="badge-tier-text">✦ GOLD BADGE</div>
      </div>
    </div>
    <button class="copy-btn" onclick="copyBadge('gold')">[ COPY HTML ]</button>
  </div>

  <!-- SILVER -->
  <div class="badge-col" id="col-silver">
    <div class="tier-label">SILVER 50~65</div>
    <div class="ai-badge silver badge-sq" id="badge-silver">
      <div class="crown">
        <svg viewBox="0 0 20 16" fill="#C0C0C0" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
          <rect x="0" y="4" width="20" height="2"/>
          <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
          <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
          <rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/>
        </svg>
      </div>
      <div class="badge-text-col">
        <div class="badge-title-text">SEEN BY AI</div>
        <div class="badge-tier-text">✦ SILVER BADGE</div>
      </div>
    </div>
    <button class="copy-btn" onclick="copyBadge('silver')">[ COPY HTML ]</button>
  </div>

  <!-- BRONZE -->
  <div class="badge-col" id="col-bronze">
    <div class="tier-label">BRONZE 30~49</div>
    <div class="ai-badge bronze badge-sq" id="badge-bronze">
      <div class="crown">
        <svg viewBox="0 0 20 16" fill="#CD7F32" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/>
          <rect x="0" y="4" width="20" height="2"/>
          <rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/>
          <rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/>
          <rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/>
        </svg>
      </div>
      <div class="badge-text-col">
        <div class="badge-title-text">NOTICED BY AI</div>
        <div class="badge-tier-text">✦ BRONZE BADGE</div>
      </div>
    </div>
    <button class="copy-btn" onclick="copyBadge('bronze')">[ COPY HTML ]</button>
  </div>

</div>

<script>
let curShape = 'sq'
let curSize  = 'l'

const HINTS = {
  sq:   { l: 'SQUARE · L — 160 × 160px', m: 'SQUARE · M — 112 × 112px', s: 'SQUARE · S — 80 × 80px' },
  rect: { l: 'RECTANGLE · L — 240 × 70px', m: 'RECTANGLE · M — 180 × 54px', s: 'RECTANGLE · S — 130 × 40px' },
}

// shape configs for HTML snippet generation
const SHAPES = {
  sq: {
    l: { w:160, h:160, px:16, gap:10, cw:40, ch:32, titleSz:'0.46rem', tierSz:'0.28rem', showTier:true,  dir:'col' },
    m: { w:112, h:112, px:10, gap:7,  cw:28, ch:22, titleSz:'0.32rem', tierSz:'0.22rem', showTier:true,  dir:'col' },
    s: { w:80,  h:80,  px:8,  gap:5,  cw:20, ch:16, titleSz:'0.22rem', tierSz:null,      showTier:false, dir:'col' },
  },
  rect: {
    l: { w:240, h:70, px:16, gap:14, cw:36, ch:29, titleSz:'0.46rem', tierSz:'0.27rem', showTier:true,  dir:'row' },
    m: { w:180, h:54, px:12, gap:10, cw:26, ch:21, titleSz:'0.34rem', tierSz:'0.21rem', showTier:true,  dir:'row' },
    s: { w:130, h:40, px:9,  gap:8,  cw:18, ch:14, titleSz:'0.24rem', tierSz:null,      showTier:false, dir:'row' },
  },
}

const TIERS = {
  gold:   { bg:'#0a0800', border:'#FFD700', color:'#FFD700', label:'PICKED BY AI',   tier:'✦ GOLD BADGE'   },
  silver: { bg:'#08090a', border:'#C0C0C0', color:'#C0C0C0', label:'SEEN BY AI',     tier:'✦ SILVER BADGE' },
  bronze: { bg:'#090809', border:'#CD7F32', color:'#CD7F32', label:'NOTICED BY AI',  tier:'✦ BRONZE BADGE' },
}

function applyState() {
  const shape = curShape
  const size  = curSize

  document.getElementById('size-hint').textContent = HINTS[shape][size]

  ;['gold','silver','bronze'].forEach(tier => {
    const el = document.getElementById('badge-' + tier)
    // reset layout class
    el.className = `ai-badge ${tier} badge-${shape} ${shape}-${size}`
  })

  // update badge-row container class for sizing
  const row = document.getElementById('badge-row')
  row.className = `badge-row ${shape}-${size}`
}

function setShape(shape, btn) {
  document.querySelectorAll('#shape-tabs .tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  curShape = shape
  applyState()
}

function setSize(size, btn) {
  document.querySelectorAll('#size-tabs .tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  curSize = size
  applyState()
}

function buildSnippet(tierKey) {
  const t = TIERS[tierKey]
  const s = SHAPES[curShape][curSize]
  const crownSvg = `<svg width="${s.cw}" height="${s.ch}" viewBox="0 0 20 16" fill="${t.color}" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="2" height="4"/><rect x="9" y="0" width="2" height="4"/><rect x="18" y="0" width="2" height="4"/><rect x="0" y="4" width="20" height="2"/><rect x="0" y="6" width="2" height="6"/><rect x="18" y="6" width="2" height="6"/><rect x="4" y="8" width="2" height="2"/><rect x="9" y="8" width="2" height="2"/><rect x="14" y="8" width="2" height="2"/><rect x="0" y="12" width="20" height="2"/><rect x="2" y="14" width="16" height="2"/></svg>`

  const tierLine = s.showTier
    ? `\n  <div style="font-family:'Press Start 2P',monospace;font-size:${s.tierSz};letter-spacing:0.15em;opacity:0.65;color:${t.color};">${t.tier}</div>`
    : ''

  if (s.dir === 'col') {
    // Square: crown top, title, tier — vertical center
    return `<a href="https://pickedby.ai" target="_blank" rel="noopener" style="display:inline-flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;width:${s.w}px;height:${s.h}px;gap:${s.gap}px;padding:0 ${s.px}px;background:${t.bg};border:2px solid ${t.border};text-align:center;font-family:'Press Start 2P',monospace;box-sizing:border-box;">
  ${crownSvg}
  <div style="font-size:${s.titleSz};letter-spacing:0.06em;color:${t.color};">${t.label}</div>${tierLine}
</a>`
  } else {
    // Rectangle: crown left, text right — horizontal
    const mbTitle = s.showTier ? `margin-bottom:4px;` : ''
    return `<a href="https://pickedby.ai" target="_blank" rel="noopener" style="display:inline-flex;flex-direction:row;align-items:center;text-decoration:none;width:${s.w}px;height:${s.h}px;gap:${s.gap}px;padding:0 ${s.px}px;background:${t.bg};border:2px solid ${t.border};font-family:'Press Start 2P',monospace;box-sizing:border-box;">
  ${crownSvg}
  <div>
    <div style="font-size:${s.titleSz};letter-spacing:0.06em;color:${t.color};${mbTitle}">${t.label}</div>${tierLine}
  </div>
</a>`
  }
}

function copyBadge(tier) {
  const html = buildSnippet(tier)
  navigator.clipboard.writeText(html).then(() => {
    const btns = document.querySelectorAll('.copy-btn')
    btns.forEach(b => {
      if (b.getAttribute('onclick') === `copyBadge('${tier}')`) {
        b.textContent = '[ COPIED! ✓ ]'
        b.classList.add('copied')
        setTimeout(() => {
          b.textContent = '[ COPY HTML ]'
          b.classList.remove('copied')
        }, 2000)
      }
    })
  })
}
</script>
</body>
</html>
