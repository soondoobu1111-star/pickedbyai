<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unsubscribe — pickedby.ai</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
      color: #ccc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }
    .wrap { max-width: 480px; width: 100%; text-align: center; }
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.75rem;
      color: #FFD700;
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logo .by { color: #FFD700; }
    .icon { font-size: 2.5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.3rem; color: #fff; margin-bottom: 0.75rem; font-weight: 700; }
    p { font-size: 0.88rem; color: #666; line-height: 1.7; margin-bottom: 1rem; }
    .form-row { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
    .form-row input {
      flex: 1;
      background: #0d0d0d;
      border: 1px solid #222;
      color: #fff;
      padding: 0.75rem 1rem;
      font-size: 0.88rem;
      outline: none;
    }
    .form-row input:focus { border-color: #FFD700; }
    .btn {
      background: #111;
      color: #FFD700;
      border: 1px solid #333;
      padding: 0.75rem 1.25rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .btn:hover { border-color: #FFD700; }
    .msg { font-size: 0.82rem; color: #555; margin-top: 0.5rem; min-height: 1.2rem; }
    .msg.ok { color: #00E676; }
    .msg.err { color: #FF3D3D; }
    .back { display: inline-block; margin-top: 2.5rem; font-size: 0.8rem; color: #333; text-decoration: none; }
    .back:hover { color: #fff; }
    .divider { border: none; border-top: 1px solid #111; margin: 2rem 0; }
    .note { font-size: 0.78rem; color: #333; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <svg width="18" height="14" viewBox="0 0 20 16" fill="#FFD700" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="2" height="4"/>
        <rect x="9" y="0" width="2" height="4"/>
        <rect x="18" y="0" width="2" height="4"/>
        <rect x="0" y="4" width="20" height="2"/>
        <rect x="0" y="6" width="2" height="6"/>
        <rect x="18" y="6" width="2" height="6"/>
        <rect x="4" y="8" width="2" height="2"/>
        <rect x="9" y="8" width="2" height="2"/>
        <rect x="14" y="8" width="2" height="2"/>
        <rect x="0" y="12" width="20" height="2"/>
        <rect x="2" y="14" width="16" height="2"/>
      </svg>
      <span>picked<span class="by">by</span>.ai</span>
    </div>

    <div id="viewUnsubscribe">
      <div class="icon">👋</div>
      <h1>Unsubscribe</h1>
      <p>Enter your email address to remove yourself from pickedby.ai product updates. You won't hear from us again.</p>

      <div class="form-row">
        <input type="email" id="emailInput" placeholder="you@example.com" />
        <button class="btn" onclick="doUnsubscribe()">UNSUBSCRIBE</button>
      </div>
      <div class="msg" id="msg"></div>

      <hr class="divider" />
      <p class="note">Changed your mind? You can re-join the waitlist at <a href="/" style="color:#555;text-decoration:underline">pickedby.ai</a> anytime.</p>
    </div>

    <a class="back" href="/">← Back to pickedby.ai</a>
  </div>

  <script>
    // Pre-fill email from URL param if present (?email=...)
    (function () {
      const params = new URLSearchParams(window.location.search);
      const e = params.get('email');
      if (e) document.getElementById('emailInput').value = decodeURIComponent(e);
    })();

    async function doUnsubscribe() {
      const email = document.getElementById('emailInput').value.trim();
      const msg = document.getElementById('msg');

      if (!email || !email.includes('@')) {
        msg.textContent = 'Please enter a valid email address.';
        msg.className = 'msg err';
        return;
      }

      msg.textContent = 'Processing...';
      msg.className = 'msg';

      try {
        const res = await fetch('https://pickedbyai-api.pickedby.ai/v1/unsubscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        if (res.ok) {
          msg.textContent = "Done. You've been removed from our list.";
          msg.className = 'msg ok';
          document.querySelector('.form-row').style.display = 'none';
        } else {
          msg.textContent = 'Something went wrong. Email hello@pickedby.ai and we\'ll remove you manually.';
          msg.className = 'msg err';
        }
      } catch {
        msg.textContent = 'Network error. Email hello@pickedby.ai and we\'ll remove you manually.';
        msg.className = 'msg err';
      }
    }
  </script>
</body>
</html>
