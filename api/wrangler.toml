name = "pickedbyai-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[vars]
ENVIRONMENT = "production"

[env.staging]
name = "pickedbyai-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.staging.placement]
mode = "smart"

[env.staging.ai]
binding = "AI"

[ai]
binding = "AI"

# Secrets (wrangler secret put으로 설정):
# - BREVO_API_KEY
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_KEY

# Custom domain: api.pickedby.ai
# → CF Dashboard > Workers > pickedbyai-api > Settings > Domains & Routes > Add Custom Domain
