name = "pickedbyai-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[ai]
binding = "AI"

# Secrets (wrangler secret put으로 설정):
# - BREVO_API_KEY
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_KEY

# Custom domain: api.pickedby.ai
# → CF Dashboard > Workers > pickedbyai-api > Settings > Domains & Routes > Add Custom Domain
